name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-skillfit-api
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  DEPLOY_PATH: /home/ec2-user/skillfit-api

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
          JWT_SECRET: ci-test-secret
          DATABASE_URL: sqlite:///./test.db
          GEMINI_API_KEY: test-key
        run: pytest backend/tests -q

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: skillfit-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check-deploy:
    name: Check deploy secrets
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Verify EC2 secrets exist
        id: check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          missing=()
          [ -z "$EC2_HOST" ] && missing+=("EC2_HOST")
          [ -z "$EC2_USER" ] && missing+=("EC2_USER")
          [ -z "$EC2_SSH_KEY" ] && missing+=("EC2_SSH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy. Add GitHub Actions secrets: ${missing[*]}"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Deploy secrets are configured."

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: check-deploy
    if: needs.check-deploy.outputs.ready == 'true'
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: EC2_DEPLOY_PATH
          command_timeout: 20m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${EC2_DEPLOY_PATH:-/home/ec2-user/skillfit-api}"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Deploy path $DEPLOY_PATH is not a git repo."
              echo "On EC2, run: git clone https://github.com/yashpandit97/skillfit-api.git $DEPLOY_PATH"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            if [ ! -f .env ]; then
              echo "Missing $DEPLOY_PATH/.env on EC2."
              echo "Create it once with POSTGRES_PASSWORD, GEMINI_API_KEY, JWT_SECRET, FRONTEND_URL, FIREBASE_PROJECT_ID."
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main

            # EC2 Docker often lacks compose buildx 0.17+; plain docker build is more reliable.
            docker build -t skillfit-api-backend -f Dockerfile .
            docker compose -f docker-compose.yaml up -d --no-build

            echo "Waiting for backend health check..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yaml exec -T backend python -c \
                "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"; then
                echo "Backend is healthy."
                docker compose -f docker-compose.yaml ps
                exit 0
              fi
              sleep 5
            done

            echo "Backend failed health check."
            docker compose -f docker-compose.yaml logs --tail=100 backend
            exit 1
